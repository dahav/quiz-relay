[screenshot]
monitor = 1

[ai]
provider = "openai"          # "openai" or "anthropic"
model = "gpt-4.1-mini"
timeout_seconds = 30
response_language = "de"
prompt_file = ".prompt"

[relay]
enabled = false
url = "http://127.0.0.1:8080/vibe"
timeout_seconds = 2.0
on = 120
off = 80
pause = 500
duty = 170

[mouse]
event = "middle-click"
